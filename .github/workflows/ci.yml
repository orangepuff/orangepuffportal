name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore OrangepuffPortal.slnx

      - name: Build
        run: dotnet build OrangepuffPortal.slnx --no-restore -c Release

      - name: Test
        run: dotnet test OrangepuffPortal.slnx --no-build -c Release
