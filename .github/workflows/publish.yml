# NuGet Trusted Publishing (OIDC, no stored API key) — verified against the sibling
# orangepuff/DiagnosticLog repo's working publish.yml.
#
# Triggered by pushing a branch named Release/vX.Y.Z — packs and publishes all five
# OrangepuffPortal.* packages at that exact version.
name: Publish

on:
  push:
    branches:
      - "Release/v*.*.*"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from branch name
        id: version
        run: |
          branch="${GITHUB_REF#refs/heads/Release/v}"
          echo "version=$branch" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore OrangepuffPortal.slnx

      - name: Build
        run: dotnet build OrangepuffPortal.slnx --no-restore -c Release

      - name: Test
        run: dotnet test OrangepuffPortal.slnx --no-build -c Release

      - name: Pack
        run: |
          for proj in \
            src/OrangepuffPortal.Shared/OrangepuffPortal.Shared.csproj \
            src/OrangepuffPortal.Identity.Contract/OrangepuffPortal.Identity.Contract.csproj \
            src/OrangepuffPortal.Identity/OrangepuffPortal.Identity.csproj \
            src/OrangepuffPortal.Bff/OrangepuffPortal.Bff.csproj \
            src/OrangepuffPortal.Host/OrangepuffPortal.Host.csproj ; do
            dotnet pack "$proj" -c Release -p:Version=${{ steps.version.outputs.version }} -o ./artifacts
          done

      - name: NuGet login (Trusted Publishing)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: orangepuff

      - name: Push to NuGet.org
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
