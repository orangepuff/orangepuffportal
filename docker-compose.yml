services:
  host:
    build:
      context: .
      dockerfile: samples/OrangepuffPortal.SampleHost/Dockerfile
    container_name: orangepuffportal-samplehost
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080;https://+:8081"
      ASPNETCORE_Kestrel__Certificates__Default__Path: "/https/orangepuffportal-devcert.pfx"
      ASPNETCORE_Kestrel__Certificates__Default__Password: "${DEV_CERT_PASSWORD}"
      Authentication__Google__ClientId: "${GOOGLE_CLIENT_ID}"
      Authentication__Google__ClientSecret: "${GOOGLE_CLIENT_SECRET}"
      Seed__AdminPassword: "${SEED_ADMIN_PASSWORD}"
    ports:
      - "5100:8080"
      - "7100:8081"
    volumes:
      - ./certs:/https:ro
      - ./data-protection-keys:/keys
    extra_hosts:
      - "host.docker.internal:host-gateway"
