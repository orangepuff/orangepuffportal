<div class="user-list">
  <div class="user-list__toolbar">
    <h1>Users</h1>
    <button mat-flat-button type="button" (click)="openAddDialog()">Add user</button>
  </div>

  <table mat-table [dataSource]="users()" class="user-list__table">
    <ng-container matColumnDef="username">
      <th mat-header-cell *matHeaderCellDef>Username</th>
      <td mat-cell *matCellDef="let user">{{ user.username }}</td>
    </ng-container>

    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let user">{{ user.email ?? '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="displayName">
      <th mat-header-cell *matHeaderCellDef>Display name</th>
      <td mat-cell *matCellDef="let user">{{ user.displayName ?? '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="isActive">
      <th mat-header-cell *matHeaderCellDef>Active</th>
      <td mat-cell *matCellDef="let user">{{ user.isActive ? 'Yes' : 'No' }}</td>
    </ng-container>

    <ng-container matColumnDef="template">
      <th mat-header-cell *matHeaderCellDef>Template</th>
      <td mat-cell *matCellDef="let user">{{ templateName(user) }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let user">
        <button mat-icon-button type="button" (click)="openEditDialog(user)" aria-label="Edit">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button type="button" (click)="deleteUser(user)" aria-label="Delete">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
