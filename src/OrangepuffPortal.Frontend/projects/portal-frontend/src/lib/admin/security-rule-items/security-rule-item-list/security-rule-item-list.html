<div class="security-rule-item-list">
  <div class="security-rule-item-list__toolbar">
    <h1>Security rule items</h1>
    <button mat-flat-button type="button" (click)="openAddDialog()">Add rule item</button>
  </div>

  <table mat-table [dataSource]="items()" class="security-rule-item-list__table">
    <ng-container matColumnDef="category">
      <th mat-header-cell *matHeaderCellDef>Category</th>
      <td mat-cell *matCellDef="let item">{{ categoryName(item) }}</td>
    </ng-container>

    <ng-container matColumnDef="code">
      <th mat-header-cell *matHeaderCellDef>Code</th>
      <td mat-cell *matCellDef="let item">{{ item.code }}</td>
    </ng-container>

    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef>Description</th>
      <td mat-cell *matCellDef="let item">{{ item.description }}</td>
    </ng-container>

    <ng-container matColumnDef="ruleType">
      <th mat-header-cell *matHeaderCellDef>Rule type</th>
      <td mat-cell *matCellDef="let item">{{ item.ruleType }}</td>
    </ng-container>

    <ng-container matColumnDef="sortOrder">
      <th mat-header-cell *matHeaderCellDef>Sort order</th>
      <td mat-cell *matCellDef="let item">{{ item.sortOrder ?? '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="hidden">
      <th mat-header-cell *matHeaderCellDef>Hidden</th>
      <td mat-cell *matCellDef="let item">{{ item.hidden ? 'Yes' : 'No' }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let item">
        <button mat-icon-button type="button" (click)="openEditDialog(item)" aria-label="Edit">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button type="button" (click)="deleteItem(item)" aria-label="Delete">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
